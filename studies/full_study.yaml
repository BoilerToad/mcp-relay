# mcp-relay full study configuration
# All models pulled as of March 2026 — annotated with tool-call compatibility
# Run with: python scripts/run_study.py --study studies/full_study.yaml
#
# backend field:
#   ollama  — served via Ollama at localhost:11434 (default if omitted)
#   mlx     — served via mlx_lm.server at localhost:8080 (Apple Silicon only)

study:
  name: "full_study"
  description: "All downloaded models — 3 runs each, tool-capable only"
  runs_per_model: 3

# Compatibility legend:
#   enabled: true   — tool-call capable, include in study
#   enabled: false  — incompatible or excluded (reason noted)

models:

  # ── mlx-lm (Apple Silicon, requires: python -m mlx_lm.server --port 8080) ──
  - name: mlx-community/Qwen3.5-9B-MLX-4bit    # ~5.5GB  | Alibaba dense
    enabled: true
    backend: mlx
  - name: mlx-community/Qwen3-30B-A3B-MLX-4bit # ~18GB   | Alibaba MoE 30B/3.3B active
    enabled: false                               # enable on 36GB+ unified memory
    backend: mlx

  # ── Ollama — confirmed tool-capable ────────────────────────────────────
  - name: qwen2.5:latest          # 4.7GB  | Alibaba   | CAPABLE WITH RISK
    enabled: true
    backend: ollama
  - name: qwen3.5:latest          # 6.6GB  | Alibaba   | CAPABLE WITH RISK, hybrid thinking
    enabled: true
    backend: ollama
  - name: gpt-oss:20b             # 13.8GB | OpenAI    | CAPABLE WITH RISK
    enabled: true
    backend: ollama
  - name: glm-4.7-flash:latest    # 19.0GB | ZHIPU AI  | CAPABLE WITH RISK
    enabled: true
    backend: ollama
  - name: llama3.2:latest         # 2.0GB  | Meta      | UNRELIABLE (T4 fails)
    enabled: true
    backend: ollama
  - name: Llama3.1:8b             # 4.9GB  | Meta      | not yet run
    enabled: true
    backend: ollama
  - name: Llama3.1:latest         # 4.9GB  | Meta      | DUPLICATE of Llama3.1:8b
    enabled: false
    backend: ollama

  # ── Incompatible — no tools API ────────────────────────────────────────
  - name: deepseek-r1:7b          # 4.7GB  | DeepSeek | no tools API
    enabled: false
    backend: ollama
  - name: deepseek-r1:8b          # 5.2GB  | DeepSeek | no tools API
    enabled: false
    backend: ollama
  - name: deepseek-r1:14b         # 9.0GB  | DeepSeek | no tools API
    enabled: false
    backend: ollama
  - name: deepseek-r1:32b         # 19.9GB | DeepSeek | no tools API
    enabled: false
    backend: ollama
  - name: hf.co/unsloth/DeepSeek-R1-Distill-Llama-8B-GGUF:F16
    enabled: false
    backend: ollama
  - name: gemma3:4b               # 3.3GB  | Google   | no tools API (confirmed)
    enabled: false
    backend: ollama
  - name: gemma3:12b              # 8.1GB  | Google   | no tools API (unconfirmed)
    enabled: false
    backend: ollama
  - name: gemma3:12b-beeai        # 8.1GB  | Google/BeeAI | unverified
    enabled: false
    backend: ollama
  - name: gemma3:27b              # 17.4GB | Google   | unverified
    enabled: false
    backend: ollama
  - name: gemma2:27b              # 15.6GB | Google   | older arch
    enabled: false
    backend: ollama

  # ── Cloud-routed ───────────────────────────────────────────────────────
  - name: deepseek-v3.2:cloud
    enabled: false
    backend: ollama
  - name: glm-4.7:cloud
    enabled: false
    backend: ollama
  - name: gemini-3-pro-preview:latest
    enabled: false
    backend: ollama

  # ── Not applicable ─────────────────────────────────────────────────────
  - name: mxbai-embed-large:latest  # embedding only
    enabled: false
  - name: llama3.2-vision:11b
    enabled: false
  - name: llava:13b
    enabled: false
  - name: llama3.3:latest           # 42.5GB — too slow
    enabled: false
  - name: nemotron-3-nano:latest    # 24.3GB | NVIDIA — unverified
    enabled: false

# Optional overrides
db: null            # null = ~/.mcp-relay/research.db
tiers: null         # null = all tiers
extra_pytest_args: []
